<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레포지토리 연동 — GitXpert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { min-height: 100vh; background: #0d1117; color: #e6edf3; font-family: 'Pretendard', sans-serif; }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      border-bottom: 1px solid #21262d; background: #0d1117;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-mark {
      width: 28px; height: 28px; background: linear-gradient(135deg, #58a6ff 0%, #3fb950 100%);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: #0d1117;
    }
    .nav-logo-text { font-size: 15px; font-weight: 600; color: #e6edf3; letter-spacing: -0.01em; }
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #388bfd, #3fb950);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #fff;
    }
    .nav-username { font-size: 13px; color: #8b949e; }

    /* MAIN */
    .main { max-width: 760px; margin: 0 auto; padding: 48px 24px 120px; }

    /* PAGE HEADER */
    .page-header { margin-bottom: 28px; }
    .page-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(56,139,253,0.1); border: 1px solid rgba(56,139,253,0.3);
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; color: #58a6ff; font-family: 'JetBrains Mono', monospace; margin-bottom: 16px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #58a6ff; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .page-title { font-size: 26px; font-weight: 600; color: #e6edf3; letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.3; }
    .page-title span { color: #58a6ff; }
    .page-desc { font-size: 14px; color: #8b949e; line-height: 1.7; }

    /* ACCOUNT BOX */
    .account-box {
      display: flex; align-items: center; justify-content: space-between;
      background: #161b22; border: 1px solid #21262d; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 20px;
    }
    .account-info { display: flex; align-items: center; gap: 12px; }
    .gh-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #388bfd, #a371f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: #fff;
    }
    .account-name { font-size: 14px; font-weight: 500; color: #e6edf3; }
    .account-sub { font-size: 12px; color: #8b949e; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .account-status {
      display: flex; align-items: center; gap: 6px; font-size: 12px; color: #3fb950;
      background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.25);
      border-radius: 20px; padding: 4px 10px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; }

    /* TOOLBAR */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .toolbar-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 200px; }
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: #8b949e; pointer-events: none;
    }
    .search-input {
      width: 100%; height: 36px; background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 0 12px 0 34px; font-size: 13px; color: #e6edf3;
      font-family: 'Pretendard', sans-serif; outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: #484f58; }
    .search-input:focus { border-color: #58a6ff; }
    .filter-select {
      height: 36px; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 0 10px; font-size: 13px; color: #c9d1d9;
      font-family: 'Pretendard', sans-serif; outline: none; cursor: pointer; min-width: 110px;
    }
    .filter-select:focus { border-color: #58a6ff; }
    .count-badge { font-size: 12px; color: #8b949e; white-space: nowrap; }
    .count-badge strong { color: #58a6ff; font-family: 'JetBrains Mono', monospace; }

    /* LIST HEADER */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #161b22;
      border: 1px solid #21262d; border-radius: 8px 8px 0 0; border-bottom: none;
    }
    .list-header-left { display: flex; align-items: center; gap: 10px; }
    .list-header-left label { font-size: 13px; color: #8b949e; cursor: pointer; }

    .btn-collapse {
      display: inline-flex; align-items: center; gap: 6px;
      background: #21262d; border: 1px solid #444c56;
      border-radius: 6px; padding: 5px 12px;
      font-size: 12px; color: #c9d1d9;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-collapse:hover { background: #2d333b; border-color: #768390; color: #e6edf3; }
    .btn-collapse svg { transition: transform 0.25s ease; flex-shrink: 0; }
    .btn-collapse.collapsed svg { transform: rotate(180deg); }

    /* REPO LIST */
    .repo-list-outer {
      border: 1px solid #21262d; border-radius: 0 0 10px 10px;
      overflow: hidden; margin-bottom: 20px;
    }
    .repo-list-body {
      max-height: 4000px; overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .repo-list-body.collapsed { max-height: 0; }

    .collapsed-strip {
      display: none; align-items: center; justify-content: space-between;
      padding: 13px 16px; background: #0d1117;
    }
    .collapsed-strip.visible { display: flex; }
    .strip-text { font-size: 13px; color: #8b949e; }
    .strip-text strong { color: #c9d1d9; font-weight: 500; }

    .repo-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 16px; background: #0d1117;
      border-top: 1px solid #161b22; cursor: pointer; transition: background 0.1s;
    }
    .repo-item:first-child { border-top: none; }
    .repo-item:hover { background: #161b22; }
    .repo-item.selected { background: rgba(56,139,253,0.05); }
    .repo-check {
      margin-top: 2px; flex-shrink: 0;
      width: 16px; height: 16px; accent-color: #58a6ff; cursor: pointer;
    }
    .repo-body { flex: 1; min-width: 0; }
    .repo-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .repo-name {
      font-size: 14px; font-weight: 500; color: #58a6ff;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .repo-vis {
      font-size: 11px; padding: 1px 7px; border-radius: 20px; border: 1px solid; font-weight: 500;
      color: #3fb950; border-color: rgba(63,185,80,0.35); background: rgba(63,185,80,0.08);
    }
    .repo-desc { font-size: 12px; color: #8b949e; line-height: 1.5; margin-bottom: 7px; }
    .repo-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #8b949e; font-family: 'JetBrains Mono', monospace; }
    .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    /* STICKY BOTTOM BAR */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0d1117; border-top: 1px solid #21262d; z-index: 200; padding: 0 24px;
    }
    .bottom-bar-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px; gap: 16px;
    }
    .selected-summary { display: flex; align-items: center; gap: 12px; }
    .selected-count { font-size: 22px; font-weight: 600; color: #e6edf3; font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .selected-label { font-size: 12px; color: #8b949e; margin-top: 3px; }
    .selected-names { font-size: 11px; color: #8b949e; max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .bar-divider { width: 1px; height: 32px; background: #30363d; }
    .bar-actions { display: flex; align-items: center; gap: 12px; }
    .btn-skip {
      background: none; border: none; font-size: 13px; color: #8b949e;
      cursor: pointer; padding: 0; font-family: 'Pretendard', sans-serif;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .btn-skip:hover { color: #c9d1d9; }
    .btn-connect {
      display: inline-flex; align-items: center; gap: 8px;
      height: 42px; padding: 0 24px;
      background: #2ea043; border: 1px solid #3fb950;
      border-radius: 8px; font-size: 14px; font-weight: 500; color: #fff;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      font-family: 'Pretendard', sans-serif;
    }
    .btn-connect:hover:not(:disabled) { background: #3ac454; }
    .btn-connect:active:not(:disabled) { transform: scale(0.98); }
    .btn-connect:disabled {
      background: #1c2128; border-color: #30363d; color: #4d5566; cursor: not-allowed;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(40px);
      background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 12px 20px;
      font-size: 14px; color: #e6edf3; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; white-space: nowrap; opacity: 0; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-icon {
      width: 20px; height: 20px; border-radius: 50%; background: rgba(63,185,80,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 11px; color: #3fb950; flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .main { padding: 24px 16px 120px; }
      .page-title { font-size: 20px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-left { flex-direction: column; }
      .account-box { flex-direction: column; align-items: flex-start; gap: 10px; }
      .nav-username { display: none; }
      .selected-names, .bar-divider { display: none; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="#">
      <div class="nav-logo-mark">gx</div>
      <span class="nav-logo-text">GitXpert</span>
    </a>
    <div class="nav-user">
      <div class="nav-avatar">KD</div>
      <span class="nav-username">@kim-dev</span>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div class="page-badge"><div class="badge-dot"></div>step 1 of 2 — repository setup</div>
      <h1 class="page-title">연동할 <span>GitHub 레포지토리</span>를<br>선택하세요</h1>
      <p class="page-desc">선택한 레포지토리의 커밋, 이슈, PR을 분석해 인사이트를 제공합니다.<br>나중에 설정에서 언제든지 변경할 수 있습니다.</p>
    </div>

    <div class="account-box">
      <div class="account-info">
        <div class="gh-avatar">K</div>
        <div>
          <div class="account-name">kim-dev</div>
          <div class="account-sub">github.com/kim-dev</div>
        </div>
      </div>
      <div class="account-status"><div class="status-dot"></div>인증 완료</div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/>
          </svg>
          <input class="search-input" type="text" id="searchInput" placeholder="레포지토리 검색...">
        </div>
        <select class="filter-select" id="langFilter">
          <option value="">전체 언어</option>
          <option value="TypeScript">TypeScript</option>
          <option value="JavaScript">JavaScript</option>
          <option value="Python">Python</option>
          <option value="Go">Go</option>
          <option value="Rust">Rust</option>
        </select>
      </div>
      <span class="count-badge" id="countBadge">공개 레포 <strong>18</strong>개</span>
    </div>

    <div class="list-header">
      <div class="list-header-left">
        <input type="checkbox" id="selectAll" class="repo-check">
        <label for="selectAll">전체 선택</label>
      </div>
      <button class="btn-collapse" id="collapseBtn" onclick="toggleCollapse()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 6l4 4 4-4"/>
        </svg>
        <span id="collapseBtnLabel">접기</span>
      </button>
    </div>

    <div class="repo-list-outer">
      <div class="repo-list-body" id="repoListBody"></div>
      <div class="collapsed-strip" id="collapsedStrip">
        <span class="strip-text" id="stripText"></span>
      </div>
    </div>
  </main>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <div class="selected-summary">
        <div>
          <div class="selected-count" id="selCount">0</div>
          <div class="selected-label">개 선택됨</div>
        </div>
        <div class="bar-divider"></div>
        <div class="selected-names" id="selNames">레포지토리를 선택하세요</div>
      </div>
      <div class="bar-actions">
        <button class="btn-skip">나중에 설정</button>
        <button class="btn-connect" id="connectBtn" disabled>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 8h14M9 2l6 6-6 6"/>
          </svg>
          연동하기
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span id="toastMsg"></span>
  </div>

  <script>
    const REPOS = [
      { name: "ai-chat-api",      desc: "실시간 AI 채팅 REST API 서버, WebSocket 지원",           lang: "TypeScript", langColor: "#3178c6", stars: 187, forks: 23, updated: "5일 전" },
      { name: "blog-engine",      desc: "마크다운 기반 정적 블로그 생성기",                        lang: "JavaScript", langColor: "#f1e05a", stars: 19,  forks: 3,  updated: "2달 전" },
      { name: "cli-tools",        desc: "개발 생산성을 위한 CLI 유틸리티 모음",                    lang: "Go",         langColor: "#00ADD8", stars: 34,  forks: 6,  updated: "3주 전" },
      { name: "css-animations",   desc: "웹 애니메이션 예제 및 스니펫 모음",                       lang: "JavaScript", langColor: "#f1e05a", stars: 22,  forks: 4,  updated: "1달 전" },
      { name: "data-pipeline",    desc: "ETL 파이프라인 — Kafka + Spark 기반 스트리밍 처리",       lang: "Python",     langColor: "#3572A5", stars: 64,  forks: 11, updated: "3일 전" },
      { name: "design-system",    desc: "사내 디자인 시스템 컴포넌트 라이브러리",                  lang: "TypeScript", langColor: "#3178c6", stars: 203, forks: 41, updated: "1일 전" },
      { name: "design-tokens",    desc: "디자인 토큰 중앙 관리 시스템 및 CLI 생성 도구",           lang: "TypeScript", langColor: "#3178c6", stars: 47,  forks: 8,  updated: "1주 전" },
      { name: "dom-helpers",      desc: "크로스 브라우저 DOM 조작 헬퍼 함수 모음",                 lang: "JavaScript", langColor: "#f1e05a", stars: 14,  forks: 2,  updated: "6주 전" },
      { name: "dotfiles",         desc: "개인 개발환경 설정 (zsh, nvim, tmux)",                    lang: "Go",         langColor: "#00ADD8", stars: 11,  forks: 1,  updated: "5일 전" },
      { name: "fastapi-template", desc: "FastAPI 프로젝트 보일러플레이트 (JWT, Docker 포함)",      lang: "Python",     langColor: "#3572A5", stars: 88,  forks: 19, updated: "4일 전" },
      { name: "go-microservice",  desc: "gRPC 기반 마이크로서비스 보일러플레이트",                 lang: "Go",         langColor: "#00ADD8", stars: 78,  forks: 17, updated: "4일 전" },
      { name: "k8s-configs",      desc: "프로덕션 Kubernetes 배포 설정 모음",                      lang: "Go",         langColor: "#00ADD8", stars: 45,  forks: 12, updated: "1주 전" },
      { name: "ml-classifier",    desc: "이미지 분류 모델 학습 및 서빙 파이프라인",                lang: "Python",     langColor: "#3572A5", stars: 113, forks: 29, updated: "2주 전" },
      { name: "next-portfolio",   desc: "개인 포트폴리오 사이트 — Next.js 14 App Router 기반",     lang: "TypeScript", langColor: "#3178c6", stars: 42,  forks: 8,  updated: "2일 전" },
      { name: "react-hooks-kit",  desc: "자주 쓰는 커스텀 훅 모음 라이브러리",                    lang: "TypeScript", langColor: "#3178c6", stars: 91,  forks: 15, updated: "1주 전" },
      { name: "rust-parser",      desc: "고성능 로그 파서 — Rust로 구현",                          lang: "Rust",       langColor: "#dea584", stars: 56,  forks: 9,  updated: "6일 전" },
      { name: "ts-utils",         desc: "타입 유틸리티 함수 모음 및 제네릭 헬퍼",                  lang: "TypeScript", langColor: "#3178c6", stars: 31,  forks: 5,  updated: "3주 전" },
      { name: "wasm-renderer",    desc: "WebAssembly 기반 경량 2D 렌더러",                         lang: "Rust",       langColor: "#dea584", stars: 72,  forks: 14, updated: "2주 전" },
    ];

    const selected = new Set();
    let isCollapsed = false;
    let filteredRepos = [...REPOS];

    function render() {
      const body = document.getElementById('repoListBody');
      if (filteredRepos.length === 0) {
        body.innerHTML = '<div style="padding:48px 24px;text-align:center;"><div style="font-size:28px;margin-bottom:12px;">🔍</div><div style="font-size:14px;color:#8b949e;">검색 결과가 없습니다</div></div>';
        updateUI(); return;
      }
      body.innerHTML = filteredRepos.map(r => `
        <div class="repo-item${selected.has(r.name) ? ' selected' : ''}" onclick="toggleRepo('${r.name}',this)">
          <input type="checkbox" class="repo-check"${selected.has(r.name) ? ' checked' : ''} onclick="event.stopPropagation();toggleRepo('${r.name}',this.closest('.repo-item'))">
          <div class="repo-body">
            <div class="repo-top">
              <span class="repo-name">${r.name}</span>
              <span class="repo-vis">Public</span>
            </div>
            <div class="repo-desc">${r.desc}</div>
            <div class="repo-meta">
              <span class="meta-item"><span class="lang-dot" style="background:${r.langColor}"></span>${r.lang}</span>
              <span class="meta-item">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
                ${r.stars}
              </span>
              <span class="meta-item">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-.878a2.25 2.25 0 111.5 0v.878a2.25 2.25 0 01-2.25 2.25h-1.5v2.128a2.251 2.251 0 11-1.5 0V8.5h-1.5A2.25 2.25 0 013 6.25v-.878a2.25 2.25 0 111.5 0z"/></svg>
                ${r.forks}
              </span>
              <span class="meta-item" style="color:#484f58">업데이트 ${r.updated}</span>
            </div>
          </div>
        </div>
      `).join('');
      updateUI();
    }

    function toggleRepo(name, el) {
      selected.has(name) ? selected.delete(name) : selected.add(name);
      el.classList.toggle('selected', selected.has(name));
      el.querySelector('input').checked = selected.has(name);
      updateUI();
    }

    function toggleCollapse() {
      isCollapsed = !isCollapsed;
      document.getElementById('repoListBody').classList.toggle('collapsed', isCollapsed);
      document.getElementById('collapseBtn').classList.toggle('collapsed', isCollapsed);
      document.getElementById('collapseBtnLabel').textContent = isCollapsed ? '펼치기' : '접기';
      document.getElementById('collapsedStrip').classList.toggle('visible', isCollapsed);
      if (isCollapsed) updateStripText();
    }

    function updateStripText() {
      const sel = selected.size;
      document.getElementById('stripText').innerHTML = sel > 0
        ? `<strong>${filteredRepos.length}개</strong> 레포지토리 &nbsp;·&nbsp; <strong style="color:#58a6ff">${sel}개</strong> 선택됨`
        : `<strong>${filteredRepos.length}개</strong> 레포지토리`;
    }

    function updateUI() {
      const count = selected.size;
      document.getElementById('selCount').textContent = count;
      document.getElementById('connectBtn').disabled = count === 0;
      const names = [...selected];
      document.getElementById('selNames').textContent = count > 0
        ? names.slice(0,3).join(', ') + (names.length > 3 ? ` 외 ${names.length-3}개` : '')
        : '레포지토리를 선택하세요';
      const sa = document.getElementById('selectAll');
      const allChecked = filteredRepos.length > 0 && filteredRepos.every(r => selected.has(r.name));
      sa.checked = allChecked;
      sa.indeterminate = !allChecked && filteredRepos.some(r => selected.has(r.name));
      if (isCollapsed) updateStripText();
    }

    document.getElementById('selectAll').addEventListener('change', function() {
      filteredRepos.forEach(r => this.checked ? selected.add(r.name) : selected.delete(r.name));
      render();
    });

    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const lang = document.getElementById('langFilter').value;
      filteredRepos = REPOS.filter(r =>
        (!q || r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q)) &&
        (!lang || r.lang === lang)
      );
      document.getElementById('countBadge').innerHTML = `공개 레포 <strong>${filteredRepos.length}</strong>개`;
      render();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('langFilter').addEventListener('change', applyFilters);

    document.getElementById('connectBtn').addEventListener('click', function() {
      document.getElementById('toastMsg').textContent = `${selected.size}개 레포지토리 연동이 완료되었습니다!`;
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    });

    render();
  </script>
</body>
</html>
